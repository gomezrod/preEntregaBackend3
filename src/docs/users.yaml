tags:
  - name: Users
    description: Endpoints para administracion de usuarios.

paths:
  /api/users:
    get:
      tags:
        - Users
      summary: Obtener todos los usuarios
      responses:
        '200':
          description: Listado de usuarios obtenido correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
  /api/users/{uid}:
    get:
      tags:
        - Users
      summary: Obtener un usuario por ID
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: ID del usuario.
      responses:
        '200':
          description: Usuario encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Users
      summary: Actualizar un usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: ID del usuario.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  example: Juan Actualizado
                last_name:
                  type: string
                  example: Perez
                role:
                  type: string
                  example: admin
                documents:
                  type: array
                  items:
                    $ref: '#/components/schemas/UserDocument'
                last_connection:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Usuario actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '404':
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Users
      summary: Eliminar un usuario
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: ID del usuario.
      responses:
        '200':
          description: Usuario eliminado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User deleted
                required:
                  - status
                  - message
  /api/users/{uid}/documents:
    post:
      tags:
        - Users
      summary: Subir documentos de un usuario
      description: Permite subir uno o multiples archivos y los agrega al arreglo documents del usuario.
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: ID del usuario.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                documents:
                  type: array
                  items:
                    type: string
                    format: binary
              required:
                - documents
      responses:
        '200':
          description: Documentos cargados correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadDocumentsResponse'
        '400':
          description: No se enviaron archivos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
